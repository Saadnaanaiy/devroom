services:
  - type: web
    name: devroom-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: devroom
      - key: FRONTEND_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA
        value: "/etc/ssl/certs/ca-certificates.crt"
